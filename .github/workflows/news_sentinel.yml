name: Sentinel News Monitor

on:
  schedule:
    - cron: '*/30 9-21 * * 1-5'
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Sentinel News
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python main.py --mode news

      - name: Salvar news_log.json (Git Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_log.json
          git commit -m "🤖 auto: atualizando news_log [skip ci]" || echo "Sem mudanças no news_log.json"
          git push
