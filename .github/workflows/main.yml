name: Market Sentinel Daily Analysis

on:
  schedule:
    # Roda a cada 4 horas, das 09h às 21h UTC, apenas de SEGUNDA a SEXTA (1-5)
    - cron: '0 9-21/4 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4
        with:
          ref: main # <--- Isso força o uso do código mais recente da main
          fetch-depth: 0 # Opcional: baixa todo o histórico se precisar de logs de commit

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Agente Financeiro
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python script.py
